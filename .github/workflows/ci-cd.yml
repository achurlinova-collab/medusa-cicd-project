name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          dockerfile: ./apps/backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/medusa-backend:latest

      - name: Build and push storefront image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/storefront
          dockerfile: ./apps/storefront/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/medusa-storefront:latest
# trigger rebuild
