apiVersion: v1
kind: Secret
metadata:
  name: medusa-secret
  namespace: medusa
type: Opaque
stringData:
  POSTGRES_USER: medusa
  POSTGRES_PASSWORD: medusa_password
  POSTGRES_DB: medusa_db
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: medusa
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: medusa-secret
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: medusa
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
